<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nori Web</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        font-family: "DM Sans", sans-serif;
        color: #1f1f1f;
        display: grid;
        place-items: center;
        min-height: 100vh;
        background-color: #1a1a1a;
        background-image:
          linear-gradient(rgba(0, 0, 0, 0.35), rgba(0, 0, 0, 0.35)),
          image-set(
            url("assets/background.webp") type("image/webp"),
            url("assets/background.jpg") type("image/jpeg")
          );
        background-position: center;
        background-size: cover;
        background-repeat: no-repeat;
      }

      .card {
        box-sizing: border-box;
        width: 62%;
        text-align: center;
        padding: 4rem 3rem;
        border: 1px solid rgba(255, 255, 255, 0.25);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.68);
        backdrop-filter: blur(6px);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: 2rem;
        font-weight: 700;
      }

      p {
        margin: 0;
        line-height: 1.6;
        color: #5c5c5c;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Arte Billarístico</h1>
      <p>Aquí se planifican proyectos futuros</p>
    </main>
  </body>
</html>
